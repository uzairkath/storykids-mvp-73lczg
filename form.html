<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalize Your Story | StoryKids</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-soft">
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Story<span>Kids</span></a>
        </div>
    </nav>

    <main class="form-page">
        <div class="container-small">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="card">
                <form id="multiStepForm">
                    <!-- Step 1: Name -->
                    <div class="form-step active" data-step="1">
                        <h2>Who is the hero?</h2>
                        <p class="step-desc">Enter your child's first name exactly as you'd like it to appear.</p>
                        <div class="input-group">
                            <label for="childName">Child's Name</label>
                            <input type="text" id="childName" placeholder="e.g. Leo" required>
                        </div>
                        <div class="form-footer">
                            <button type="button" class="btn btn-primary btn-full next-btn">Continue</button>
                        </div>
                    </div>

                    <!-- Step 2: Photo -->
                    <div class="form-step" data-step="2">
                        <h2>Add a Photo</h2>
                        <p class="step-desc">Optional: Upload a clear photo of your child for the story cover.</p>
                        <div class="upload-zone" id="uploadZone">
                            <input type="file" id="photoUpload" accept="image/*" hidden>
                            <div class="upload-content">
                                <div class="upload-icon">📸</div>
                                <p>Click to upload or drag & drop</p>
                                <span>Max size: 5MB</span>
                            </div>
                            <img id="imagePreview" class="image-preview hidden">
                        </div>
                        <div class="form-footer">
                            <button type="button" class="btn btn-secondary back-btn">Back</button>
                            <button type="button" class="btn btn-primary next-btn">Continue</button>
                        </div>
                    </div>

                    <!-- Step 3: Delivery & Consent -->
                    <div class="form-step" data-step="3">
                        <h2>Final Details</h2>
                        <p class="step-desc">Where should we send the magic?</p>
                        <div class="input-group">
                            <label for="parentEmail">Your Email Address</label>
                            <input type="email" id="parentEmail" placeholder="parent@example.com" required>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="consent" required>
                            <label for="consent">I agree to the processing of data to generate the story. <a href="#">Learn more</a></label>
                        </div>
                        <div class="form-footer">
                            <button type="button" class="btn btn-secondary back-btn">Back</button>
                            <button type="submit" class="btn btn-primary">Go to Checkout</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
