<!DOCTYPE html>

<body class="bg-soft">
    <main class="container-small text-center">
        <div class="success-illustration">
            <svg viewBox="0 0 24 24" fill="none" stroke="#5DB7DE" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 12l3 3 5-5"></path>

        <h1 class="display-title">Magic is on its way!</h1>
